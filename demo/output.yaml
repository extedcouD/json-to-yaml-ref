                                type: object
                                properties:
                                  label:
                                    type: string
                                  timestamp:
                                    type: string
                              params: &params
                                type: object
                                properties:
                                  bank_code:
                                    type: string
                                  bank_account_number:
                                    type: string
                                  transaction_id:
                                    type: string
                                  amount:
                                    type: string
                                  currency:
                                    type: string
      responses: &responses
        "200":
          description: Synchronous ACK/NACK response
          content:
            application/json:
              schema:
                type: object
                properties:
                  context:
                    type: object
                  message:
                    type: object
                    properties:
                      ack:
                        type: object
                        properties:
                          status:
                            type: string
